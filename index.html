<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site no GitHub</title>
    <style>
        /* Estilos básicos para deixar a página bonita */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            color: #24292e; /* Cor padrão do GitHub */
        }
        p {
            font-size: 1.1em;
            color: #586069;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f; /* Verde de confirmação do GitHub */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #22863a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Meu Site no GitHub!</h1>
        <p>Se você está vendo esta página, significa que o seu arquivo <strong>index.html</strong> foi configurado e hospedado com sucesso.</p>
        <a href="https://github.com" target="_blank" class="btn">Visitar meu GitHub</a>
    </div>

</body>
</html>
